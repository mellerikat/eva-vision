apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eva-vision.fullname" . }}
  labels:
    {{- include "eva-vision.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "eva-vision.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eva-vision.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "eva-vision.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default true }}
      {{- end }}

      imagePullSecrets:
        {{- if .Values.imagePullSecrets.enabled }}
          {{- if .Values.imagePullSecrets.ExistingSecret }}
        - name: {{ .Values.imagePullSecrets.ExistingSecret }}
          {{- else if .Values.imagePullSecrets.create }}
        - name: {{ include "eva-vision.fullname" . }}-regcred
          {{- end }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: eva-vision
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: proxy
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /live
              port: proxy
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /ready
              port: proxy
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- $resources := deepCopy .Values.resources }}
            {{- if .Values.gpu.mig.resourceName }}
            {{- $_ := set $resources.limits .Values.gpu.mig.resourceName (.Values.gpu.count | int) }}
            {{- $_ := set $resources.requests .Values.gpu.mig.resourceName (.Values.gpu.count | int) }}
            {{- end }}
            {{- toYaml $resources | nindent 12 }}
          env:
            {{- if ne (toString .Values.gpu.cudaVisibleDevices) "" }}
            - name: CUDA_VISIBLE_DEVICES
              value: {{ .Values.gpu.cudaVisibleDevices | quote }}
            {{- end }}
            - name: GPU_MPS_ENABLED
              value: {{ .Values.gpu.mps.enabled | quote }}
            - name: CUDA_MPS_PIPE_DIRECTORY
              value: {{ .Values.gpu.mps.pipeDirectory | quote }}
            - name: CUDA_MPS_LOG_DIRECTORY
              value: {{ .Values.gpu.mps.logDirectory | quote }}
          volumeMounts:
            - name: config-volume
              mountPath: /app/eva_ts/config.properties.template
              subPath: config.properties.template
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
            {{- if .Values.gpu.mps.enabled }}
            - name: nvidia-mps
              mountPath: {{ .Values.gpu.mps.pipeDirectory | quote }}
            - name: nvidia-mps-log
              mountPath: {{ .Values.gpu.mps.logDirectory | quote }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: logs
              mountPath: {{ .Values.persistence.mountPath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
            {{- end }}

      volumes:
        - name: config-volume
          configMap:
            name: {{ include "eva-vision.fullname" . }}-config
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
        {{- if .Values.gpu.mps.enabled }}
        - name: nvidia-mps
          emptyDir: {}
        - name: nvidia-mps-log
          emptyDir: {}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.existingClaim }}
                         {{ .Values.persistence.existingClaim }}
                       {{- else -}}
                         {{ include "eva-vision.fullname" . }}-logs
                       {{- end }}
        {{- end }}
